<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — TéléMéd</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  .role-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .role-tab {
    flex: 1; padding: 9px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: none;
    color: var(--text2); cursor: pointer; font-family: var(--font);
    font-size: 0.85rem; font-weight: 500; transition: all var(--transition);
  }
  .role-tab.active { background: rgba(59,158,255,0.12); border-color: var(--accent); color: var(--accent); }
  .link { color: var(--accent); text-decoration: none; font-size: 0.88rem; }
  .link:hover { text-decoration: underline; }
  .google-btn {
    width: 100%; display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 11px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font); font-size: 0.9rem;
    font-weight: 500; cursor: pointer; transition: all var(--transition);
  }
  .google-btn:hover { border-color: var(--accent); }
</style>
</head>
<body>
<div class="auth-bg">
  <div class="auth-card fade-up">
    <div class="auth-logo">
      <div class="mark">🏥</div>
      <h1>TéléMéd</h1>
      <p>Connectez-vous à votre espace santé</p>
    </div>

    <div class="role-tabs" id="roleTabs">
      <button class="role-tab active" data-role="patient">👤 Patient</button>
      <button class="role-tab" data-role="medecin">👨‍⚕️ Médecin</button>
      <button class="role-tab" data-role="admin">⚙️ Admin</button>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="votre@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between">
          Mot de passe
          <a href="#" class="link">Oublié ?</a>
        </label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
        Se connecter
      </button>
    </form>

    <div class="divider">ou</div>

    <button class="google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      Continuer avec Google
    </button>

    <p style="text-align:center;margin-top:20px;font-size:.88rem;color:var(--text2)">
      Pas encore de compte ? <a href="register.html" class="link">S'inscrire</a>
    </p>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { loginEmail, loginGoogle, redirectIfLoggedIn } from '../js/auth.js';
import { toast } from '../js/utils.js';

redirectIfLoggedIn();

let selectedRole = 'patient';
document.querySelectorAll('.role-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    selectedRole = tab.dataset.role;
  });
});

function dashboardFor(role) {
  const map = { patient: 'dashboard.html', medecin: 'medecin-dashboard.html', admin: 'admin.html' };
  return map[role] || 'dashboard.html';
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Connexion…';
  try {
    await loginEmail(
      document.getElementById('email').value,
      document.getElementById('password').value
    );
    // Le rôle est vérifié côté firestore dans requireAuth sur chaque page
    window.location.href = dashboardFor(selectedRole);
  } catch (err) {
    toast(err.message.replace('Firebase: ', ''), 'error');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
});

document.getElementById('googleBtn').addEventListener('click', async () => {
  try {
    await loginGoogle(selectedRole);
    window.location.href = dashboardFor(selectedRole);
  } catch (err) {
    toast(err.message, 'error');
  }
});
</script>
</body>
</html>
