<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — TéléMéd</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  .role-tabs { display:flex; gap:8px; margin-bottom:22px; }
  .role-tab {
    flex:1; padding:9px 6px; border-radius:var(--radius-sm);
    border:1px solid var(--border); background:none;
    color:var(--text2); cursor:pointer; font-family:var(--font);
    font-size:.82rem; font-weight:500; transition:all var(--transition);
  }
  .role-tab.active { background:rgba(59,158,255,0.12); border-color:var(--accent); color:var(--accent); }
  .link { color:var(--accent); text-decoration:none; font-size:.88rem; }
  .link:hover { text-decoration:underline; }
  .google-btn {
    width:100%; display:flex; align-items:center; justify-content:center;
    gap:10px; padding:12px; border-radius:var(--radius-sm);
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); font-family:var(--font); font-size:.9rem;
    font-weight:500; cursor:pointer; transition:all var(--transition);
  }
  .google-btn:hover { border-color:var(--accent); background:rgba(59,158,255,0.05); }
  .google-btn:disabled { opacity:.6; cursor:not-allowed; }
  #redirect-loader {
    display:none; position:fixed; inset:0;
    background:var(--bg); z-index:9999;
    flex-direction:column; align-items:center; justify-content:center; gap:16px;
  }
  #redirect-loader.show { display:flex; }
</style>
</head>
<body>

<div id="redirect-loader">
  <div class="spinner"></div>
  <p style="color:var(--text2);font-size:.9rem">Connexion Google en cours…</p>
</div>

<div class="auth-bg">
  <div class="auth-card fade-up">
    <div class="auth-logo">
      <div class="mark">🏥</div>
      <h1>TéléMéd</h1>
      <p>Connectez-vous à votre espace santé</p>
    </div>

    <div class="role-tabs">
      <button class="role-tab active" data-role="patient">👤 Patient</button>
      <button class="role-tab" data-role="medecin">👨‍⚕️ Médecin</button>
      <button class="role-tab" data-role="admin">⚙️ Admin</button>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="votre@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between">
          Mot de passe <a href="#" class="link">Oublié ?</a>
        </label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Se connecter</button>
    </form>

    <div class="divider">ou</div>

    <button class="google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/>
        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/>
        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/>
        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/>
      </svg>
      Continuer avec Google
    </button>

    <p style="text-align:center;margin-top:20px;font-size:.88rem;color:var(--text2)">
      Pas de compte ? <a href="register.html" class="link">S'inscrire</a>
    </p>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { loginEmail, loginGoogle, handleGoogleRedirect, redirectIfLoggedIn } from '../js/auth.js';
import { toast } from '../js/utils.js';

const loader = document.getElementById('redirect-loader');

// ── Traiter le retour redirect Google ────────────────────────────
try {
  const result = await handleGoogleRedirect();
  if (result) {
    const map = { patient:'dashboard.html', medecin:'medecin-dashboard.html', admin:'admin.html' };
    window.location.href = map[result.role] || 'dashboard.html';
  }
} catch (err) {
  toast('Erreur Google : ' + err.message, 'error');
}

redirectIfLoggedIn('dashboard.html');

// ── Rôle sélectionné ─────────────────────────────────────────────
let selectedRole = 'patient';
document.querySelectorAll('.role-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    selectedRole = tab.dataset.role;
  });
});

function dashboardFor(role) {
  return { patient:'dashboard.html', medecin:'medecin-dashboard.html', admin:'admin.html' }[role] || 'dashboard.html';
}

// ── Login email ───────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    await loginEmail(document.getElementById('email').value, document.getElementById('password').value);
    window.location.href = dashboardFor(selectedRole);
  } catch (err) {
    const msgs = {
      'auth/user-not-found':     'Aucun compte avec cet email.',
      'auth/wrong-password':     'Mot de passe incorrect.',
      'auth/invalid-credential': 'Email ou mot de passe incorrect.',
      'auth/too-many-requests':  'Trop de tentatives, réessaie plus tard.',
    };
    toast(msgs[err.code] || err.message, 'error');
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
});

// ── Google → redirect ─────────────────────────────────────────────
document.getElementById('googleBtn').addEventListener('click', async () => {
  document.getElementById('googleBtn').disabled = true;
  loader.classList.add('show');
  try {
    await loginGoogle(selectedRole);
  } catch (err) {
    loader.classList.remove('show');
    document.getElementById('googleBtn').disabled = false;
    toast('Erreur : ' + err.message, 'error');
  }
});
</script>
</body>
</html>
