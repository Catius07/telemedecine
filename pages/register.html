<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — TéléMéd</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  .role-select { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px; }
  .role-card {
    border:2px solid var(--border); border-radius:var(--radius); padding:16px;
    text-align:center; cursor:pointer; transition:all var(--transition);
    background:none; font-family:var(--font);
  }
  .role-card .icon { font-size:2rem; margin-bottom:8px; }
  .role-card .label { font-size:.85rem; font-weight:600; color:var(--text2); }
  .role-card.active { border-color:var(--accent); background:rgba(59,158,255,0.08); }
  .role-card.active .label { color:var(--accent); }
  .doc-fields { display:none; }
  .doc-fields.show { display:block; }
  .link { color:var(--accent); text-decoration:none; font-size:.88rem; }
  .link:hover { text-decoration:underline; }
  .google-btn {
    width:100%; display:flex; align-items:center; justify-content:center;
    gap:10px; padding:12px; border-radius:var(--radius-sm);
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); font-family:var(--font); font-size:.9rem;
    font-weight:500; cursor:pointer; transition:all var(--transition);
  }
  .google-btn:hover { border-color:var(--accent); }
  #redirect-loader {
    display:none; position:fixed; inset:0; background:var(--bg); z-index:9999;
    flex-direction:column; align-items:center; justify-content:center; gap:16px;
  }
  #redirect-loader.show { display:flex; }
</style>
</head>
<body>

<div id="redirect-loader">
  <div class="spinner"></div>
  <p style="color:var(--text2);font-size:.9rem">Connexion Google en cours…</p>
</div>

<div class="auth-bg">
  <div class="auth-card fade-up" style="max-width:480px">
    <div class="auth-logo">
      <div class="mark">🏥</div>
      <h1>Créer un compte</h1>
      <p>Choisissez votre profil</p>
    </div>

    <div class="role-select">
      <button class="role-card active" data-role="patient">
        <div class="icon">👤</div><div class="label">Patient</div>
      </button>
      <button class="role-card" data-role="medecin">
        <div class="icon">👨‍⚕️</div><div class="label">Médecin</div>
      </button>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <input type="text" id="name" class="form-control" placeholder="Jean Dupont" required autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="votre@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" id="password" class="form-control" placeholder="8 caractères minimum" required minlength="8" autocomplete="new-password">
      </div>

      <div class="doc-fields" id="docFields">
        <div class="form-group">
          <label class="form-label">Spécialité</label>
          <select id="specialite" class="form-control">
            <option value="">Choisir…</option>
            <option>Médecine générale</option><option>Cardiologie</option>
            <option>Pédiatrie</option><option>Dermatologie</option>
            <option>Gynécologie</option><option>Neurologie</option>
            <option>Ophtalmologie</option><option>Psychiatrie</option><option>Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">N° Ordre des Médecins</label>
          <input type="text" id="ordreNum" class="form-control" placeholder="CM-XXXXX">
        </div>
        <div class="form-group">
          <label class="form-label">Tarif consultation (FCFA)</label>
          <input type="number" id="tarif" class="form-control" placeholder="5000" min="0">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="regBtn">Créer mon compte</button>
    </form>

    <div class="divider">ou</div>

    <button class="google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/>
        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/>
        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/>
        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/>
      </svg>
      S'inscrire avec Google
    </button>

    <p style="text-align:center;margin-top:20px;font-size:.88rem;color:var(--text2)">
      Déjà un compte ? <a href="login.html" class="link">Se connecter</a>
    </p>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { register, loginGoogle, handleGoogleRedirect, redirectIfLoggedIn } from '../js/auth.js';
import { toast } from '../js/utils.js';

const loader = document.getElementById('redirect-loader');

try {
  const result = await handleGoogleRedirect();
  if (result) {
    const map = { patient:'dashboard.html', medecin:'medecin-dashboard.html', admin:'admin.html' };
    window.location.href = map[result.role] || 'dashboard.html';
  }
} catch(err) {
  toast('Erreur Google : ' + err.message, 'error');
}

redirectIfLoggedIn('dashboard.html');

let selectedRole = 'patient';
document.querySelectorAll('.role-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    selectedRole = card.dataset.role;
    document.getElementById('docFields').classList.toggle('show', selectedRole === 'medecin');
  });
});

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = 'Création…';
  const extra = {};
  if (selectedRole === 'medecin') {
    extra.specialite = document.getElementById('specialite').value;
    extra.ordreNum   = document.getElementById('ordreNum').value;
    extra.tarif      = Number(document.getElementById('tarif').value) || 5000;
    extra.verified   = false; extra.rating = 0; extra.consultations = 0;
  }
  try {
    await register({
      email:    document.getElementById('email').value,
      password: document.getElementById('password').value,
      name:     document.getElementById('name').value,
      role: selectedRole, extra
    });
    toast('Compte créé !', 'success');
    setTimeout(() => {
      window.location.href = selectedRole === 'medecin' ? 'medecin-dashboard.html' : 'dashboard.html';
    }, 800);
  } catch (err) {
    const msgs = {
      'auth/email-already-in-use': 'Cet email est déjà utilisé.',
      'auth/weak-password':        'Mot de passe trop faible.',
    };
    toast(msgs[err.code] || err.message, 'error');
    btn.disabled = false; btn.textContent = 'Créer mon compte';
  }
});

document.getElementById('googleBtn').addEventListener('click', async () => {
  document.getElementById('googleBtn').disabled = true;
  loader.classList.add('show');
  try {
    await loginGoogle(selectedRole);
  } catch (err) {
    loader.classList.remove('show');
    document.getElementById('googleBtn').disabled = false;
    toast('Erreur : ' + err.message, 'error');
  }
});
</script>
</body>
</html>
